<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marinella Lanza</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:Inter,sans-serif;
      background:#060b10;
      color:#f8fafc;
    }
    a{text-decoration:none;color:inherit}
    .container{width:min(90%,980px);margin:0 auto}
    header{
      padding:30px 0;
      display:flex;
      justify-content:space-between;
      align-items:center;
      color:#9db0c3;
    }
    .brand{
      font-weight:800;
      color:#fff;
      letter-spacing:-.03em;
    }
    .brand span{color:#22c55e}
    nav{display:flex;gap:24px}
    .hero{
      min-height:calc(100vh - 90px);
      display:flex;
      align-items:center;
    }
    .content{
      max-width:760px;
    }
    h1{
      font-size:clamp(3.2rem,8vw,6rem);
      line-height:.95;
      letter-spacing:-.07em;
      margin-bottom:18px;
    }
    .lead{
      font-size:1.15rem;
      color:#86efac;
      font-weight:700;
      margin-bottom:18px;
    }
    .desc{
      color:#9db0c3;
      font-size:1.03rem;
      line-height:1.85;
      max-width:620px;
      margin-bottom:28px;
    }
    .row{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
    }
    .btn{
      padding:14px 20px;
      border-radius:12px;
      font-weight:700;
    }
    .btn-primary{background:#22c55e;color:#04120a}
    .btn-secondary{border:1px solid rgba(255,255,255,.12)}
    @media(max-width:780px){
      nav{display:none}
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">Marinella<span>.dev</span></div>
      <nav>
        <a href="https://github.com/mlanza683" target="_blank">GitHub</a>
        <a href="https://www.linkedin.com/in/marinella-l-0563414b/" target="_blank">LinkedIn</a>
        <a href="mailto:lanza_marinella@libero.it">Email</a>
      </nav>
    </header>

    <section class="hero">
      <div class="content">
        <h1>Marinella<br>Lanza</h1>
        <div class="lead">Full Stack Developer</div>
        <p class="desc">
          CRM, API REST, dashboard e applicazioni web costruite con Laravel,
          Node.js e React. Soluzioni pulite, scalabili e orientate al risultato.
        </p>
        <div class="row">
          <a class="btn btn-primary" href="mailto:lanza_marinella@libero.it">Contattami</a>
          <a class="btn btn-secondary" href="https://github.com/mlanza683" target="_blank">Vedi progetti</a>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
